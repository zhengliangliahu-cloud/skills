# === 数据集参数配置 ===
# 每个数据集是一个顶级 key，训练脚本通过 general.yaml 中的 dataset 字段索引到对应的配置段

dataset_a:
  n_channels: 22
  n_timepoints: 1000
  n_classes: 4
  n_subjects: 9
  test_subject: all             # all | 单个整数(如 1) | 整数列表(如 [1, 3, 5])
  loso: false                   # true=LOSO 跨被试, false=单被试 80/20 分层划分
  batch_size: 64
  num_workers: 0                # Windows 环境建议设为 0

  preprocessing:
    sfreq: 250                  # 目标采样率
    low_cut: 4                  # 带通滤波低截止 (null = 不滤波)
    high_cut: 45                # 带通滤波高截止 (null = 不滤波)
    start: 0                    # 时间窗口起点 (秒, 0=不裁切)
    stop: 0                     # 时间窗口终点 (秒, 0=不裁切)
    align: false                # EA 对齐: target | global | false
    car: false                  # 公共平均参考
    ra: false                   # 黎曼对齐

dataset_b:
  n_channels: 64
  n_timepoints: 640
  n_classes: 4
  n_subjects: 109
  test_subject: all
  loso: false
  batch_size: 64
  num_workers: 4
  data_path: "D:/datasets/dataset_b"  # 可选：指定数据路径

  preprocessing:
    sfreq: 160
    low_cut: null
    high_cut: null
    start: 0
    stop: 0
    align: false
    car: false
    ra: false
